name: Lock File Discipline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    branches: ["main"]
  workflow_dispatch:
  workflow_call:

permissions: {}

jobs:
  lockfile-discipline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check lock file discipline
        shell: bash
        run: |
          # Read per-repo config if present, otherwise default to 72 hours
          MIN_AGE_SECS=259200
          if [ -f ".github/lockfile-discipline.toml" ]; then
              val="$(perl -ne 'if (/^\s*minimum_release_age_seconds\s*=\s*(\d+)/) { print "$1\n"; exit }' .github/lockfile-discipline.toml)"
              [ -n "$val" ] && MIN_AGE_SECS="$val"
          fi
          min_age_days=$(( (MIN_AGE_SECS + 86399) / 86400 ))
          errors=0

          # ── Check 1: package.json → lock file (workspace-aware) ────────────────
          while IFS= read -r pkg; do
              dir="$(dirname "$pkg")"
              found=0
              search="$dir"
              while true; do
                  for lf in package-lock.json bun.lock bun.lockb yarn.lock pnpm-lock.yaml; do
                      if [ -f "$search/$lf" ]; then
                          found=1
                          break 2
                      fi
                  done
                  [ "$search" = "." ] && break
                  search="$(dirname "$search")"
              done
              if [ "$found" -eq 0 ]; then
                  echo "::error file=${pkg}::No lock file found (expected package-lock.json, bun.lock, bun.lockb, yarn.lock, or pnpm-lock.yaml in this directory or any ancestor)"
                  errors=$((errors + 1))
              fi
          done < <(find . -name "package.json" -not -path "*/node_modules/*" -not -path "*/.git/*")

          # ── Check 2: Cargo.toml → Cargo.lock (workspace-aware) ─────────────────
          while IFS= read -r toml; do
              dir="$(dirname "$toml")"
              found=0
              search="$dir"
              while true; do
                  if [ -f "$search/Cargo.lock" ]; then
                      found=1
                      break
                  fi
                  [ "$search" = "." ] && break
                  search="$(dirname "$search")"
              done
              if [ "$found" -eq 0 ]; then
                  echo "::error file=${toml}::No Cargo.lock found (checked this directory and all ancestors)"
                  errors=$((errors + 1))
              fi
          done < <(find . -name "Cargo.toml" -not -path "*/.git/*")

          # ── Check 3: bun.lock / bun.lockb → bunfig.toml minimumReleaseAge ──────
          while IFS= read -r lockfile; do
              dir="$(dirname "$lockfile")"
              bunfig="$dir/bunfig.toml"
              if [ ! -f "$bunfig" ]; then
                  echo "::error file=${lockfile}::Bun lock file found but no sibling bunfig.toml — add [install].minimumReleaseAge"
                  errors=$((errors + 1))
                  continue
              fi
              age="$(perl -ne '$in=0 if /^\[/; $in=1 if /^\[install\]/; if ($in && /^\s*minimumReleaseAge\s*=\s*(\d+)/) { print "$1\n"; exit }' "$bunfig")"
              if [ -z "$age" ]; then
                  echo "::error file=${bunfig}::Missing [install].minimumReleaseAge in bunfig.toml"
                  errors=$((errors + 1))
                  continue
              fi
              if [ "$age" -lt "$MIN_AGE_SECS" ]; then
                  echo "::error file=${bunfig}::[install].minimumReleaseAge is ${age}s but the minimum required is ${MIN_AGE_SECS}s"
                  errors=$((errors + 1))
              fi
          done < <(find . \( -name "bun.lock" -o -name "bun.lockb" \) -not -path "*/.git/*" -not -path "*/node_modules/*")

          # ── Checks 4 & 5: package-lock.json / pnpm-lock.yaml → .npmrc min-release-age
          check_npmrc() {
              local lockfile="$1"
              local dir
              dir="$(dirname "$lockfile")"
              local search="$dir"
              local npmrc=""
              while true; do
                  if [ -f "$search/.npmrc" ]; then
                      npmrc="$search/.npmrc"
                      break
                  fi
                  [ "$search" = "." ] && break
                  search="$(dirname "$search")"
              done
              if [ -z "$npmrc" ]; then
                  echo "::error file=${lockfile}::No .npmrc found (checked this directory and all ancestors) — add min-release-age"
                  errors=$((errors + 1))
                  return
              fi
              local age_raw
              age_raw="$(grep -E '^min-release-age[[:space:]]*=' "$npmrc" | head -1 | sed 's/.*=[[:space:]]*//' | grep -oE '^[0-9]+')"
              if [ -z "$age_raw" ]; then
                  echo "::error file=${npmrc}::Missing or unparseable min-release-age in .npmrc"
                  errors=$((errors + 1))
                  return
              fi
              if [ "$age_raw" -lt "$min_age_days" ]; then
                  echo "::error file=${npmrc}::min-release-age is ${age_raw} day(s) but the minimum required is ${min_age_days} day(s) (from ${MIN_AGE_SECS}s)"
                  errors=$((errors + 1))
              fi
          }

          while IFS= read -r lockfile; do
              check_npmrc "$lockfile"
          done < <(find . -name "package-lock.json" -not -path "*/node_modules/*" -not -path "*/.git/*")

          while IFS= read -r lockfile; do
              check_npmrc "$lockfile"
          done < <(find . -name "pnpm-lock.yaml" -not -path "*/.git/*")

          # ── Result ─────────────────────────────────────────────────────────────
          if [ "$errors" -gt 0 ]; then
              echo "::error::Lock file discipline check failed with ${errors} violation(s)"
              exit 1
          fi
          echo "All lock file discipline checks passed."
