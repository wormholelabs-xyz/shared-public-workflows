name: Zizmor

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    merge_group:
        branches: ["main"]
    workflow_dispatch:

permissions: {}

jobs:
    zizmor:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            actions: read
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - name: Check for auditable inputs
              id: check
              run: |
                  count=$(find .github/workflows .github/actions -name '*.yml' -o -name '*.yaml' 2>/dev/null | wc -l)
                  echo "count=$count" >> "$GITHUB_OUTPUT"

            - name: Run zizmor
              if: steps.check.outputs.count > 0
              uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
              with:
                  advanced-security: false
              continue-on-error: true
